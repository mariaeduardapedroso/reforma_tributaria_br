AllCops:
  TargetRubyVersion: 3.0
  # Cops novos ("pending") só avisam, não quebram o build.
  NewCops: disable
  SuggestExtensions: false

# Convenção padrão de gems: aspas duplas.
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Documentação de classe/módulo não é obrigatória.
Style/Documentation:
  Enabled: false

# Blocos longos são esperados em specs, no gemspec e em Struct.new.
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Metrics/MethodLength:
  Max: 15

Layout/LineLength:
  Max: 120
